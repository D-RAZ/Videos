const container = document.getElementById("container");
const randomButtonsDiv = document.getElementById("random-buttons");
const categorySelect = document.getElementById("categorySelect");
const channelSelect = document.getElementById("channelSelect");
const playCategoryBtn = document.getElementById("playRandomCategoryBtn");
const playChannelBtn = document.getElementById("playRandomChannelBtn");
const playSelectedBtn = document.getElementById("playSelectedBtn"); // New button
const categoryMap = {};
const channelMap = {};

const getRandomItem = arr => arr[Math.floor(Math.random() * arr.length)];

Object.entries(streamableLinks).forEach(([sourceName, videoObjects], i) => {
  const sourceId = `source-${i + 1}`;

  const makeButton = (text, onClick) => {
    const btn = document.createElement("button");
    btn.textContent = text;
    btn.onclick = onClick;
    return btn;
  };

  // Play random video button with count
  randomButtonsDiv.appendChild(makeButton(`🔀 ${sourceName} (${videoObjects.length})`, () => {
    const allVideos = videoObjects.map(v => v.url);
    window.open(getRandomItem(allVideos), "_blank", "noopener noreferrer");
  }));

  const block = document.createElement("div");
  block.className = "source-block";
  block.id = sourceId;

  videoObjects.forEach(obj => {
    obj.performers.forEach(p => {
      const performerKey = `${p} from ${sourceName}`;
      if (!categoryMap[performerKey]) categoryMap[performerKey] = [];
      categoryMap[performerKey].push(obj.url);
    });

    // Handle multiple channels
    const channels = Array.isArray(obj.channel) ? obj.channel : [obj.channel];
    channels.forEach(ch => {
      const channelKey = `${ch} from ${sourceName}`;
      if (!channelMap[channelKey]) channelMap[channelKey] = [];
      channelMap[channelKey].push(obj.url);
    });
  });

  container.appendChild(block);
});

// Populate performer dropdown
Object.entries(categoryMap)
  .filter(([_, urls]) => urls.length >= 5)
  .sort(([a], [b]) => a.localeCompare(b))
  .forEach(([label, urls]) => {
    const option = document.createElement("option");
    option.value = label;
    option.textContent = `${label} (${urls.length})`;
    categorySelect.appendChild(option);
  });

// Populate channel dropdown
Object.entries(channelMap)
  .filter(([label, urls]) => urls.length >= 5 && label.trim() !== "from")
  .sort(([a], [b]) => a.localeCompare(b))
  .forEach(([label, urls]) => {
    const option = document.createElement("option");
    option.value = label;
    option.textContent = `${label} (${urls.length})`;
    channelSelect.appendChild(option);
  });

// Filter channel dropdown based on selected performer
categorySelect.addEventListener('change', () => {
  const selectedPerformer = categorySelect.value;
  const associatedChannels = new Set();

  // Collect all channels related to the selected performer
  Object.entries(channelMap).forEach(([channel, urls]) => {
    if (urls.some(url => categoryMap[selectedPerformer]?.includes(url))) {
      associatedChannels.add(channel);
    }
  });

  // Clear and repopulate the channel dropdown
  channelSelect.innerHTML = '<option value="">Select a Channel</option>';
  associatedChannels.forEach(channel => {
    const option = document.createElement("option");
    option.value = channel;
    option.textContent = `${channel} (${channelMap[channel].length})`;
    channelSelect.appendChild(option);
  });
});

// Filter performer dropdown based on selected channel
channelSelect.addEventListener('change', () => {
  const selectedChannel = channelSelect.value;
  const associatedPerformers = new Set();

  // Collect all performers related to the selected channel
  Object.entries(categoryMap).forEach(([performer, urls]) => {
    if (urls.some(url => channelMap[selectedChannel]?.includes(url))) {
      associatedPerformers.add(performer);
    }
  });

  // Clear and repopulate the performer dropdown
  categorySelect.innerHTML = '<option value="">Select a Performer</option>';
  associatedPerformers.forEach(performer => {
    const option = document.createElement("option");
    option.value = performer;
    option.textContent = `${performer} (${categoryMap[performer].length})`;
    categorySelect.appendChild(option);
  });
});

// Button actions
playCategoryBtn.onclick = () => {
  const selectedCategory = categorySelect.value;
  const videos = categoryMap[selectedCategory];
  if (videos?.length) {
    window.open(getRandomItem(videos), "_blank", "noopener noreferrer");
  }
};

playChannelBtn.onclick = () => {
  const selectedChannel = channelSelect.value;
  const videos = channelMap[selectedChannel];
  if (videos?.length) {
    window.open(getRandomItem(videos), "_blank", "noopener noreferrer");
  }
};

playSelectedBtn.onclick = () => {
  const selectedCategory = categorySelect.value;
  const selectedChannel = channelSelect.value;
  
  if (selectedCategory && selectedChannel) {
    const videos = categoryMap[selectedCategory].filter(url => channelMap[selectedChannel]?.includes(url));
    if (videos?.length) {
      window.open(getRandomItem(videos), "_blank", "noopener noreferrer");
    }
  }
};
</script>
