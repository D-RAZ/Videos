<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📽️ Videos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --btn-width: 240px;
      --btn-height: 120px;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .main-wrapper {
      margin-top: 10vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2em;
      width: 100%;
      max-width: 1000px;
    }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1em;
      width: 100%;
    }

    button, select {
      background-color: #1f6feb;
      color: white;
      font-size: 2.0em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      width: var(--btn-width);
      height: var(--btn-height);
      max-width: 90vw;
      text-align: center;
    }

    button:hover, select:hover {
      background-color: #1158c7;
    }

    .dropdown-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1em;
    }

    #container, h1, h2, h3, .video-link, .source-block, #backToTop {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="main-wrapper">
  <!-- Random play from each source -->
  <div class="row" id="random-buttons"></div>

  <!-- Dropdowns and related buttons -->
  <div class="row">
    <select id="categorySelect">
      <option value="">Select a Performer</option>
    </select>
    <select id="channelSelect">
      <option value="">Select a Channel</option>
    </select>
  </div>
  <div class="row">
    <button id="playRandomCategoryBtn">🔀 Performer</button>
    <button id="playRandomChannelBtn">🔀 Channel</button>
    <!-- New button for playing video from selected performer and channel -->
    <button id="playSelectedBtn">▶️ Play from Selected</button>
  </div>
</div>

<!-- Hidden structure -->
<div id="container"></div>

<script>
const streamableLinks = {
  "Source1": [
    { url: "https://source1.com/streamable/video001", performers: ["Model A","Model B"], channel: [] },
    { url: "https://source1.com/streamable/video002", performers: ["Model B"], channel: ["Channel A","Channel X"] },
    { url: "https://source1.com/streamable/video003", performers: ["Model A"], channel: ["Channel B"] },
    { url: "https://source1.com/streamable/video004", performers: ["Model B"], channel: ["Channel B"] },
    { url: "https://source1.com/streamable/video005", performers: ["Model C"], channel: ["Channel B"] },
    { url: "https://source1.com/streamable/video006", performers: ["Model B","Model C"], channel: ["Channel B"] }
  ],
  "Source2": [
    { url: "https://source2.com/streamable/video001", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source2.com/streamable/video002", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source2.com/streamable/video003", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source3.com/streamable/video004", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source2.com/streamable/video005", performers: ["Model C"], channel: ["Channel C"] }
  ],
  "Source3": [
    { url: "https://source3.com/streamable/video001", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source3.com/streamable/video002", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source3.com/streamable/video003", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source3.com/streamable/video004", performers: ["Model C"], channel: ["Channel C"] },
    { url: "https://source3.com/streamable/video005", performers: ["Model C"], channel: ["Channel C"] }
  ]
};

const container = document.getElementById("container");
const randomButtonsDiv = document.getElementById("random-buttons");
const categorySelect = document.getElementById("categorySelect");
const channelSelect = document.getElementById("channelSelect");
const playCategoryBtn = document.getElementById("playRandomCategoryBtn");
const playChannelBtn = document.getElementById("playRandomChannelBtn");
const playSelectedBtn = document.getElementById("playSelectedBtn"); // New button
const categoryMap = {};
const channelMap = {};

const getRandomItem = arr => arr[Math.floor(Math.random() * arr.length)];

Object.entries(streamableLinks).forEach(([sourceName, videoObjects], i) => {
  const sourceId = `source-${i + 1}`;

  const makeButton = (text, onClick) => {
    const btn = document.createElement("button");
    btn.textContent = text;
    btn.onclick = onClick;
    return btn;
  };

  // Play random video button with count
  randomButtonsDiv.appendChild(makeButton(`🔀 ${sourceName} (${videoObjects.length})`, () => {
    const allVideos = videoObjects.map(v => v.url);
    window.open(getRandomItem(allVideos), "_blank", "noopener noreferrer");
  }));

  const block = document.createElement("div");
  block.className = "source-block";
  block.id = sourceId;

  videoObjects.forEach(obj => {
    obj.performers.forEach(p => {
      const performerKey = `${p} from ${sourceName}`;
      if (!categoryMap[performerKey]) categoryMap[performerKey] = [];
      categoryMap[performerKey].push(obj.url);
    });

    // Handle multiple channels
    const channels = Array.isArray(obj.channel) ? obj.channel : [obj.channel];
    channels.forEach(ch => {
      const channelKey = `${ch} from ${sourceName}`;
      if (!channelMap[channelKey]) channelMap[channelKey] = [];
      channelMap[channelKey].push(obj.url);
    });
  });

  container.appendChild(block);
});

// Populate performer dropdown
Object.entries(categoryMap)
  .filter(([_, urls]) => urls.length >= 5)
  .sort(([a], [b]) => a.localeCompare(b))
  .forEach(([label, urls]) => {
    const option = document.createElement("option");
    option.value = label;
    option.textContent = `${label} (${urls.length})`;
    categorySelect.appendChild(option);
  });

// Populate channel dropdown
Object.entries(channelMap)
  .filter(([label, urls]) => urls.length >= 5 && label.trim() !== "from")
  .sort(([a], [b]) => a.localeCompare(b))
  .forEach(([label, urls]) => {
    const option = document.createElement("option");
    option.value = label;
    option.textContent = `${label} (${urls.length})`;
    channelSelect.appendChild(option);
  });

// Filter channel dropdown based on selected performer
categorySelect.addEventListener('change', () => {
  const selectedPerformer = categorySelect.value;
  if (selectedPerformer) {
    const associatedChannels = new Set();
    // Collect all channels related to the selected performer
    Object.entries(channelMap).forEach(([channel, urls]) => {
      if (urls.some(url => categoryMap[selectedPerformer]?.includes(url))) {
        associatedChannels.add(channel);
      }
    });
    
    // Populate the channel dropdown with the filtered channels
    channelSelect.innerHTML = '<option value="">Select a Channel</option>';
    associatedChannels.forEach(channel => {
      const option = document.createElement("option");
      option.value = channel;
      option.textContent = `${channel} (${channelMap[channel].length})`;
      channelSelect.appendChild(option);
    });
  }
});

// Filter performer dropdown based on selected channel
channelSelect.addEventListener('change', () => {
  const selectedChannel = channelSelect.value;
  if (selectedChannel) {
    const associatedPerformers = new Set();
    // Collect all performers related to the selected channel
    Object.entries(categoryMap).forEach(([performer, urls]) => {
      if (urls.some(url => channelMap[selectedChannel]?.includes(url))) {
        associatedPerformers.add(performer);
      }
    });

    // Populate the performer dropdown with the filtered performers
    categorySelect.innerHTML = '<option value="">Select a Performer</option>';
    associatedPerformers.forEach(performer => {
      const option = document.createElement("option");
      option.value = performer;
      option.textContent = `${performer} (${categoryMap[performer].length})`;
      categorySelect.appendChild(option);
    });
  }
});

// Button actions
playCategoryBtn.onclick = () => {
  const selectedCategory = categorySelect.value;
  const videos = categoryMap[selectedCategory];
  if (videos?.length) {
    window.open(getRandomItem(videos), "_blank", "noopener noreferrer");
  }
};

playChannelBtn.onclick = () => {
  const selectedChannel = channelSelect.value;
  const videos = channelMap[selectedChannel];
  if (videos?.length) {
    window.open(getRandomItem(videos), "_blank", "noopener noreferrer");
  }
};

playSelectedBtn.onclick = () => {
  const selectedCategory = categorySelect.value;
  const selectedChannel = channelSelect.value;
  
  if (selectedCategory && selectedChannel) {
    const videos = categoryMap[selectedCategory].filter(url => channelMap[selectedChannel]?.includes(url));
    if (videos?.length) {
      window.open(getRandomItem(videos), "_blank", "noopener noreferrer");
    }
  }
};
</script>

</body>
</html>
